---
layout: default
---

<article class="content post">
  <header class="post-header">
    <h1 class="post-title">{{ page.title | escape }}</h1>
    <p class="post-meta">
      <time datetime="{{ page.date | date_to_xmlschema }}">
        {{ page.date | date: "%B %-d, %Y" }}
      </time>
      {% if page.author %}
        <span>by {{ page.author | escape }}</span>
      {% endif %}
    </p>
  </header>

  {{ content }}
</article>
